<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة لتسكنوا</title>
</head>
<body>
    <div id="usersList">جاري جلب البيانات...</div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // تأكد من وضع بيانات مشروعك الحقيقية هنا
        const firebaseConfig = {
            apiKey: "AIzaSyDT9_qSGi7zsqLmscnGK7VNvIJdzNaVGK0",
            projectId: "zawaj-site"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadUsers() {
            const listDiv = document.getElementById('usersList');
            const querySnapshot = await getDocs(collection(db, "brides"));
            listDiv.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                listDiv.innerHTML += `<div>كود العروسة: ${data.code || '--'}</div>`;
            });
        }
        loadUsers();
    </script>
</body>
</html>
