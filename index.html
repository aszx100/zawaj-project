<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة لتسكنوا</title>
    <style>
        :root {
            --primary: #d81b60;
            --primary-light: #f8bbd0;
            --primary-hover: #ad1457;
            --dark: #2c3e50;
            --light: #f5f6fa;
            --gray: #7f8c8d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .hero { background: linear-gradient(135deg, #fff1f4 0%, #ffe4e9 100%); padding: 80px 20px; text-align: center; border-radius: 20px; margin-bottom: 30px; }
        .hero h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { color: var(--gray); font-size: 1.2rem; max-width: 600px; margin: 0 auto 30px auto; }
        .hero-btns { display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 12px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-main { background-color: var(--primary); color: white; }
        .btn-main:hover { background-color: var(--primary-hover); }
        .btn-sec { background-color: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-sec:hover { background-color: var(--primary-light); }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 40px 0; }
        .feat-card { background: white; padding: 25px; border-radius: 12px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .feat-card h3 { color: var(--primary); margin-bottom: 10px; }
        .auth-box { max-width: 450px; background: white; padding: 30px; margin: 50px auto; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .form-group { text-align: right; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        .search-section { background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); text-align: right; }
        .quick-search { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .bride-card { background: white; border: 1px solid var(--primary-light); border-top: 5px solid var(--primary); padding: 20px; border-radius: 12px; text-align: right; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px dashed var(--primary-light); padding-bottom: 10px; }
        .code-tag { background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 13px; }
        .info-row { font-size: 14px; margin-bottom: 6px; }
        .info-row strong { color: var(--primary-hover); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; }
        .top-bar-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="landingPage">
        <div class="hero">
            <h1>منصة "لتسكنوا" للزواج الإسلامي</h1>
            <p>منصة حديثة تعتمد على الخصوصية التامة ونظام الأكواد لربط القلوب وتيسير الحلال بكل أمان وجدية.</p>
            <div class="hero-btns">
                <button class="btn btn-main" onclick="showAuth(true)">إنشاء حساب جديد</button>
                <button class="btn btn-sec" onclick="showAuth(false)">تسجيل الدخول</button>
            </div>
        </div>
    </div>

    <div id="authSection" class="auth-box hidden">
        <h2 id="authTitle">تسجيل الدخول</h2>
        <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="authEmail"></div>
        <div class="form-group"><label>كلمة المرور</label><input type="password" id="authPassword"></div>
        <button class="btn btn-main" style="width:100%" id="authBtn" onclick="handleAuth()">دخول</button>
    </div>

    <div id="mainSection" class="hidden">
        <div class="top-bar">
            <h2>لوحة تحكم المنصة</h2>
            <button class="btn btn-sec" onclick="logout()">خروج</button>
        </div>
        <div id="tabSearch">
            <div class="search-section">
                <input type="text" id="searchId" oninput="loadUsers()" placeholder="⚡ بحث سريع برقم الكود...">
            </div>
            <div id="usersList" class="cards-container">جاري جلب البيانات...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDT9_qSGi7zsqLmscnGK7VNvIJdzNaVGK0",
        projectId: "zawaj-site"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.showAuth = (mode) => {
        document.getElementById('landingPage').classList.add('hidden');
        document.getElementById('authSection').classList.remove('hidden');
    }

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('mainSection').classList.remove('hidden');
            loadUsers();
        }
    });

    window.loadUsers = async function() {
        const querySnapshot = await getDocs(collection(db, "brides"));
        const listDiv = document.getElementById('usersList');
        listDiv.innerHTML = '';
        const fId = document.getElementById('searchId').value.trim().toLowerCase();

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if(fId && (!data.code || !data.code.toLowerCase().includes(fId))) return;

            const card = document.createElement('div');
            card.className = 'bride-card';
            card.innerHTML = `
                <div class="card-header"><span class="code-tag">كود: ${data.code || '--'}</span></div>
                <div class="info-row"><strong>السن:</strong> ${data.age || '--'}</div>
                ${localStorage.getItem('isAdmin') === 'true' ? `<button onclick="deleteCard('${doc.id}')" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer; margin-top:10px;">حذف</button>` : ''}
            `;
            listDiv.appendChild(card);
        });
    }

    window.deleteCard = async function(docId) {
        if(confirm('هل أنت متأكد من الحذف؟')) {
            await deleteDoc(doc(db, "brides", docId));
            location.reload();
        }
    }

    window.logout = () => signOut(auth);
</script>

<!-- نافذة دخول الإدارة -->
<div id="admin-login-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border:1px solid #ccc; z-index:9999;">
    <input type="password" id="admin-pass" placeholder="كلمة سر الإدارة">
    <button onclick="checkAdmin()">دخول</button>
</div>

<script>
    function checkAdmin() {
        if (document.getElementById('admin-pass').value === '123456') {
            localStorage.setItem('isAdmin', 'true');
            alert('تم تفعيل وضع الإدارة');
            location.reload();
        } else { alert('كلمة سر خاطئة'); }
    }
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'q') document.getElementById('admin-login-modal').style.display = 'block';
    });
</script>
</body>
</html>
