<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة لتسكنوا</title>
    <style id="admin-styles">
        :root { --primary: #d81b60; --primary-light: #f8bbd0; --primary-hover: #ad1457; --dark: #2c3e50; --light: #f5f6fa; --gray: #7f8c8d; }
        /* الوضع المظلم عند تفعيل الإدارة */
        body.admin-mode { background-color: #121212 !important; color: #e0e0e0 !important; }
        body.admin-mode .bride-card { background-color: #1e1e1e !important; border-color: #333 !important; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .hero { background: linear-gradient(135deg, #fff1f4 0%, #ffe4e9 100%); padding: 80px 20px; text-align: center; border-radius: 20px; margin-bottom: 30px; }
        .btn { padding: 12px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background-color: var(--primary); color: white; }
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .bride-card { background: white; border: 1px solid var(--primary-light); border-top: 5px solid var(--primary); padding: 20px; border-radius: 12px; text-align: right; }
        .info-row { font-size: 14px; margin-bottom: 6px; }
    </style>
</head>
<body>

<div class="container">
    <!-- محتوى الموقع الأساسي -->
    <div id="mainSection">
        <h2 style="text-align:center; margin:20px 0;">📋 طلبات العرائس</h2>
        <div id="usersList" class="cards-container">جاري تحميل البيانات...</div>
    </div>
</div>

<!-- نافذة دخول الإدارة -->
<div id="admin-login-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border:2px solid var(--primary); border-radius:15px; z-index:9999; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.5);">
    <h3 style="color:var(--primary);">دخول لوحة الإدارة</h3>
    <input type="password" id="admin-pass" placeholder="كلمة سر الإدارة" style="margin:15px 0; border:1px solid #ccc;">
    <button onclick="checkAdmin()" class="btn btn-main">دخول آمن</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDT9_qSGi7zsqLmscnGK7VNvIJdzNaVGK0",
        projectId: "zawaj-site"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // تفعيل الوضع المظلم تلقائياً عند تحميل الصفحة إذا كان الأدمن مسجلاً
    if (localStorage.getItem('isAdmin') === 'true') {
        document.body.classList.add('admin-mode');
    }

    window.loadUsers = async function() {
        const querySnapshot = await getDocs(collection(db, "brides"));
        const listDiv = document.getElementById('usersList');
        listDiv.innerHTML = '';

        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const card = document.createElement('div');
            card.className = 'bride-card';
            card.innerHTML = `
                <div class="info-row"><strong>كود العروسة:</strong> ${data.code || '--'}</div>
                <div class="info-row"><strong>السن:</strong> ${data.age || '--'}</div>
                ${localStorage.getItem('isAdmin') === 'true' ? `<button onclick="deleteCard('${docSnap.id}')" style="margin-top:10px; background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">حذف الاستمارة</button>` : ''}
            `;
            listDiv.appendChild(card);
        });
    }

    window.deleteCard = async function(id) {
        if(confirm('هل أنت متأكد من الحذف؟')) {
            await deleteDoc(doc(db, "brides", id));
            location.reload();
        }
    }

    // تفعيل الإدارة
    window.checkAdmin = function() {
        if(document.getElementById('admin-pass').value === '123456') {
            localStorage.setItem('isAdmin', 'true');
            location.reload();
        } else { alert('كلمة سر خاطئة'); }
    }

    // اختصار لوحة المفاتيح
    document.addEventListener('keydown', (e) => {
        if(e.ctrlKey && e.key === 'q') document.getElementById('admin-login-modal').style.display = 'block';
    });

    loadUsers();
</script>

</body>
</html>
