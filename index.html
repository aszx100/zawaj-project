<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة لتسكنوا</title>
    <style>
        :root { --primary: #d81b60; --primary-light: #f8bbd0; --primary-hover: #ad1457; --dark: #2c3e50; --light: #f5f6fa; --gray: #7f8c8d; }
        /* ستايل الوضع المظلم */
        body.dark-mode { background-color: #121212; color: #ffffff; }
        body.dark-mode .bride-card, body.dark-mode .search-section, body.dark-mode .top-bar { background-color: #1e1e1e; border-color: #333; color: #eee; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--light); color: var(--dark); transition: 0.3s; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        .bride-card { background: white; border: 1px solid var(--primary-light); border-top: 5px solid var(--primary); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        .btn-main { background-color: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- المحتوى كما هو ولكن تمت إضافة سكريبت موحد بالأسفل -->
    <div id="mainSection" class="hidden">
        <div class="top-bar"><h2>لوحة التحكم</h2></div>
        <div id="usersList">جاري التحميل...</div>
    </div>
</div>

<!-- زر دخول الإدارة السهل (في أقصى أسفل الصفحة) -->
<div style="text-align:center; padding:20px; opacity:0.3;" onclick="document.getElementById('admin-login-modal').style.display='block'">⚙️</div>

<div id="admin-login-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:10px; z-index:9999;">
    <input type="password" id="admin-pass" placeholder="كلمة السر">
    <button onclick="checkAdmin()">دخول</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const app = initializeApp({ projectId: "zawaj-site" });
    const db = getFirestore(app);
    const auth = getAuth(app);

    // تفعيل المظلم عند التحميل إذا كان الأدمن مسجلاً
    if (localStorage.getItem('isAdmin') === 'true') document.body.classList.add('dark-mode');

    window.loadUsers = async function() {
        const listDiv = document.getElementById('usersList');
        const querySnapshot = await getDocs(collection(db, "brides"));
        listDiv.innerHTML = '';
        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const card = document.createElement('div');
            card.className = 'bride-card';
            card.innerHTML = `
                <div>كود: ${data.code || '--'}</div>
                ${localStorage.getItem('isAdmin') === 'true' ? `<button style="background:red; color:white;" onclick="deleteCard('${docSnap.id}')">حذف</button>` : ''}
            `;
            listDiv.appendChild(card);
        });
    }

    window.deleteCard = async (id) => {
        if(confirm('تأكيد الحذف؟')) {
            await deleteDoc(doc(db, "brides", id));
            location.reload();
        }
    }

    window.checkAdmin = () => {
        if(document.getElementById('admin-pass').value === '123456') {
            localStorage.setItem('isAdmin', 'true');
            location.reload();
        } else { alert('خطأ'); }
    }

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById('mainSection').classList.remove('hidden');
            loadUsers();
        }
    });
</script>
</body>
</html>
